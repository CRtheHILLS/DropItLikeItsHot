<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="fire" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="url(#fire)" stroke-width="3"/>
  <!-- Fire emoji top -->
  <text x="100" y="55" text-anchor="middle" font-size="36" filter="url(#glow)">🔥</text>
  <!-- Drop arrow -->
  <path d="M100 65 L100 120" stroke="url(#fire)" stroke-width="6" stroke-linecap="round"/>
  <path d="M80 105 L100 130 L120 105" stroke="url(#fire)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- File icon -->
  <rect x="75" y="135" width="50" height="40" rx="6" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.8"/>
  <path d="M105 135 L105 145 L115 145" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
  <line x1="85" y1="152" x2="105" y2="152" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="160" x2="100" y2="160" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="168" x2="108" y2="168" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
</svg>
